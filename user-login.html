<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login | CCCSP</title>
    <meta name="description" content="User login for CCCSP (temporary demo credentials).">
    <link rel="stylesheet" href="site.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="page-user-login">
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="logo-section">
                <a href="index.html">
                    <img src="images/logo.png" alt="CCCSP Logo" class="sidebar-logo">
                </a>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="landing.html"><i class="fas fa-bullhorn"></i> <span>Landing</span></a>
                </li>
                <li class="nav-item">
                    <a href="index.html"><i class="fas fa-home"></i> <span>Home</span></a>
                </li>
                <li class="nav-item">
                    <a href="about.html"><i class="fas fa-info-circle"></i> <span>About</span></a>
                </li>
                <li class="nav-item">
                    <a href="application.html"><i class="fas fa-file-signature"></i> <span>Application</span></a>
                </li>
                <li class="nav-item">
                    <a href="processes.html"><i class="fas fa-tasks"></i> <span>Processes</span></a>
                </li>
                <li class="nav-item">
                    <a href="status.html"><i class="fas fa-user-check"></i> <span>Status</span></a>
                </li>
                <li class="nav-item">
                    <a href="contact.html"><i class="fas fa-envelope"></i> <span>Contact Us</span></a>
                </li>
            </ul>
        </nav>

        <main class="main-content" id="main">
            <section class="section-inner auth-section" aria-labelledby="user-login-title">
                <div class="auth-card">
                    <h1 id="user-login-title">User Login</h1>
                    <p class="admin-subtitle">Temporary credentials for demo access.</p>
                    <p class="admin-credentials"><strong>Email:</strong> user@cccsp.local<br><strong>Password:</strong> UserPass123!</p>

                    <form id="userLoginForm" aria-label="User login form" autocomplete="off">
                        <label for="userEmail">Email</label>
                        <input type="email" id="userEmail" name="userEmail" placeholder="user@cccsp.local" required>

                        <label for="userPassword">Password</label>
                        <input type="password" id="userPassword" name="userPassword" placeholder="Temporarily hardcoded" required>

                        <div class="admin-demo-actions">
                            <button type="button" class="btn-cta" id="userUseDemo"><i class="fas fa-key" aria-hidden="true"></i> Fill demo credentials</button>
                        </div>

                        <button type="submit" class="btn-cta primary">Sign In</button>
                        <div id="userLoginMessage" role="alert" aria-live="polite"></div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
